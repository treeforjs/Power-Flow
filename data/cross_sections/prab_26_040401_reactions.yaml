paper_context: "Neutral ionization is mostly the result of electron and ion impact,\
  \ with electron-neutral and ion-neutral elastic and inelastic scattering modeled\
  \ in Monte Carlo fashion [51,53] using measured cross sections. These cross sections\
  \ are tabulated as functions of the incident particle \u2019s energy. Momentum transfer\
  \ and charge exchange are similarly modeled using the PIC-Monte Carlo technique\
  \ [72\u201374]. The ionization cross sections for the following reactions are included\
  \ in the simulations and plotted in Figs. 2 and 3 for N. BENNETT et al. PHYS. REV\
  \ . ACCEL. BEAMS 26, 040401 (2023) 040401-4 reference: e \xFE H \u2192 2e \xFE H\xFE\
  \ [75], e \xFE H2 \u2192 2e \xFE H\xFE 2 [75], e \xFE H\xFE 2 \u2192 e \xFE H\xFE\
  \ \xFE H [76],H \xFE \xFE H \u2192 e \xFE 2H\xFE [77], H \xFE H \u2192 e \xFE H\xFE\
  \ \xFE H [78],H \xFE H2 \u2192 e \xFE H\xFE \xFE H2 [78], H \xFE H2 \u2192 e \xFE\
  \ H \xFE H\xFE 2 [78],H \xFE \xFE H2 \u2192 e \xFE H\xFE \xFE H\xFE 2 [78], H\xFE\
  \ 2 \xFE H \u2192 e \xFE H\xFE \xFE H\xFE 2 [79],H \xFE \xFE H \u2192 H \xFE H\xFE\
  \ [80], H\xFE \xFE H2 \u2192 H \xFE H\xFE 2 [80],H \xFE 2 \xFE H \u2192 H\xFE \xFE\
  \ H2 [80], e \xFE H\xFE 2 \u2192 2H [81]."
