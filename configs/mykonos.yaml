project_root: ..
output_root: ../runs

geometry:
  file: ../examples/geometry/mykonos_foil_gap_5mm.json

grid:
  target_cell_size_um: 12.5
  min_cells_per_material_thickness: 16
  max_cells: 260000

time:
  dt_s: 5.0e-10
  end_s: 2.5e-7
  sample_interval_s: 1.0e-9

drive:
  mode: parametric_current
  waveform: half_sine
  peak_current_a: 8.5e5
  rise_time_s: 1.25e-7
  voltage_v: 0.0

material:
  preset: SS304

mhd:
  backend: auto
  out_of_plane_depth_m: 0.01
  poisson_iterations: 350
  electrostatic_iterations: 350
  induction_iterations: 6
  induction_relaxation: 0.6
  enforce_unidirectional_region_current: true
  current_density_limit_factor: 25.0
  conductivity:
    model: knoepfel
    reference_temperature_k: 300.0
    betacv_1_k: 9.4e-4
    density_exponent: 0.0
    temperature_cutoff_k: 100.0
    minimum_s_m: 1.0e5

desorption:
  species: H2O
  attempt_frequency_s: 1.0e13
  activation_energy_ev: 0.95
  coverage_interaction_ev: 0.15
  initial_coverage_m2: 3.0e18

velocity_grid:
  max_speed_m_s: 9000.0
  n_speed: 4
  n_angle: 12

neutrals:
  bgk_frequency_s: 1.0e7
  wall_sticking: 0.25
  initial_electron_density_m3: 1.0e10

diagnostics:
  output_dtype: float32
  hdf5_file: fields.h5
  hdf5_compression: gzip
  hdf5_compression_level: 4
  progress_every_samples: 10
  write_npz_compat: false

bolsig:
  enabled: true
  path: ../third_party/bolsigplus
  cache_dir: ../.cache/bolsigplus
  species: [H2, O2]
  fractions: [0.67, 0.33]
  en_min_td: 0.1
  en_max_td: 1000.0
  count: 12
  timeout_s: 60.0
  supplement_missing_provisional_rates: true
  gas_temperature_k: 300.0
  gas_density_m3: 3.295e22

chemistry:
  mechanism: water_fragment_mechanism.yaml
  allow_provisional_rates: true

cr_model:
  enabled: true
  references: ../data/cr_model/references.yaml
  reaction_overview: ../data/cr_model/yacora_hydrogen_reactions.yaml
  rovibrational_manifest: ../data/cr_model/rovibrational_manifest.yaml

cross_sections:
  enabled: true
  manifest: ../data/cross_sections/cross_section_manifest.yaml
  incident_energies_ev:
    e: 30.0
    H: 1000.0
    H+: 1000.0
    H2+: 1000.0

spectra:
  enabled: true
  n_pixels: 1024
  excitation_scale: 1.0e-31
  los:
    - name: center_chord
      start: [-0.0045, 0.0]
      end: [0.0045, 0.0]
      samples: 200
  calibration:
    wavelength_poly_nm: [100.0, 0.65]
    gate_s: 5.0e-9
    radiometric_response: 1.0
    background: 0.0
    instrument_fwhm_nm: 0.4

tools:
  cmake_path: C:/Users/tsmit/Downloads/cmake-4.4.0-windows-x86_64/cmake-4.4.0-windows-x86_64/bin/cmake.exe
